# Query to find a specific part by part number and revision
# Used specifically when a part already exists but has no inventory, so we can get the part ID to create inventory
# Filters to partType = TOOL only to avoid converting PART type parts unnecessarily
# This queries parts directly (not through inventory), so it works even if the part has no inventory
query GetPartByNumberAndRevision($first: Int, $after: String, $partNumber: String!, $revision: String!) {
  parts(
    filters: {
      partNumber: {ilike: $partNumber},
      revision: {ilike: $revision},
      partType: {eq: TOOL}
    }
    first: $first
    after: $after
  ) {
    edges {
      node {
        id
        partNumber
        revision
        partType
        trackingType
        description
        maintenanceIntervalSeconds
        attributes {
          key
          value
          Etag
        }
        _etag
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
