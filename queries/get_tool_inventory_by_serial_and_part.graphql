query GetToolInventoryBySerialAndPart($first: Int, $after: String, $serialNumber: String!, $partNumber: String!) {
  partInventories(
    filters: {
      serialNumber: {eq: $serialNumber},
      part: {
        partNumber: {ilike: $partNumber}
      }
    }
    first: $first
    after: $after
  ) {
    edges {
      node {
        id
        serialNumber
        _etag
        status
        unavailable
        lastMaintainedDate
        location {
          id
          name
        }
        attributes {
          key
          value
          Etag
        }
        part {
          id
          partNumber
          revision
          partType
          trackingType
          description
          maintenanceIntervalSeconds
          attributes {
            key
            value
            Etag
          }
          _etag
        }
        abomInstallations {
          id
          buildRequirement {
            id
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
