[tool.ruff]
# Set the maximum line length to 120 characters (default is 88)
line-length = 120

# Exclude common directories from linting
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "env",
    ".env",
    "build",
    "dist",
    "*.egg-info",
    "jtds-1.3.1.jar",
]

# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "B904",  # allow `raise` without specifying exception in except blocks
]

[tool.ruff.format]
# Use single quotes (matching project preference)
quote-style = "single"
# Indent with spaces
indent-style = "space"
# Use 4 spaces for indentation
skip-magic-trailing-comma = false
# Line ending style
line-ending = "auto"

[tool.ruff.isort]
# Use single quotes for imports (matching project style)
known-first-party = ["utilities"]
force-single-line = false
combine-as-imports = true

[tool.ruff.lint]
# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Maximum complexity for functions
max-complexity = 15

